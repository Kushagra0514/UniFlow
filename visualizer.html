<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>UGA Degree Path Visualizer</title>
    <script src="d3.v7.min.js"></script>
    <style>
        body { background: #0f0f0f; color: #00ff00; font-family: 'Courier New', Courier, monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #header { padding: 20px; border-bottom: 1px solid #333; background: #1a1a1a; z-index: 10; flex-shrink: 0; }
        #tree-container { flex-grow: 1; width: 100%; height: 100%; cursor: grab; background: #0a0a0a; position: relative; }
        .node circle { fill: #222; stroke-width: 2px; transition: r 0.3s; }
        .node:hover circle { r: 8px; }
        .node text { font-size: 11px; fill: #eee; pointer-events: none; }
        .link { fill: none; stroke: #444; stroke-width: 1.5px; opacity: 0.6; }
        .status-taken { stroke: #00ff00; fill: #00ff00 !important; }
        .status-progress { stroke: #ffff00; stroke-dasharray: 4; fill: #ffff00 !important; }
        .status-needed { stroke: #ff4444; fill: #ff4444 !important; }
        .legend { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.85); padding: 15px; border: 1px solid #333; border-radius: 8px; font-size: 12px; z-index: 100; pointer-events: none; }
        #error-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.7); color: #ff4444; z-index: 50; display: none; text-align: center; padding: 20px; }
    </style>
</head>
<body>
    <div id="header">
        <h2 style="margin:0">SYSTEM.PATH_VISUALIZER // <span id="major-display">INITIALIZING...</span></h2>
        <p style="margin: 5px 0 0 0; color: #888; font-size: 12px;">GPA: <span id="gpa-display">-</span> | PROGRESS: <span id="progress-display">-</span>%</p>
    </div>

    <div id="tree-container">
        <div id="error-overlay"></div>
    </div>

    <div class="legend">
        <div style="color:#00ff00">● Completed</div>
        <div style="color:#ffff00">◌ In Progress</div>
        <div style="color:#ff4444">○ Needed</div>
    </div>

    <script src="visualizer.js"></script>
</body>
</html>
